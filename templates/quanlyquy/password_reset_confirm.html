{% extends "quanlyquy/password_reset.html" %}
{% block reset_content %}
    <h2 id="confirm-title">Đặt mật khẩu mới</h2>
    <p id="confirm-desc">Mật khẩu mới phải khác với mật khẩu cũ của bạn.</p>
    
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" placeholder="••••••••" required>
                {% if field.errors %}<small style="color: #ef4444;">{{ field.errors.0 }}</small>{% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn-auth"><span id="text-btn-confirm">XÁC NHẬN THAY ĐỔI</span></button>
    </form>
{% endblock %}
