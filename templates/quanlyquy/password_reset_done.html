{% extends "quanlyquy/password_reset.html" %}
{% block reset_content %}
    <div style="text-align: center; padding: 20px 0;">
        <div style="width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px;">
            <i class="fa-solid fa-envelope-circle-check"></i>
        </div>
        <h2 id="done-title">Đã gửi thành công!</h2>
        <p id="done-desc" style="margin-bottom: 30px;">Vui lòng kiểm tra hòm thư của bạn (bao gồm cả thư rác) để tiếp tục đổi mật khẩu.</p>
        <a href="{% url 'login' %}" class="btn-auth" style="text-decoration: none; display: block; text-align: center;"><span id="text-btn-back">QUAY LẠI TRANG CHỦ</span></a>
    </div>
{% endblock %}
